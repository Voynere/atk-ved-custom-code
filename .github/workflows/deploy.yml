name: Deploy custom code

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-production
      cancel-in-progress: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Backup current theme
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -euo pipefail
            TIMESTAMP=$(date +%s)
            BACKUP_DIR="/tmp/atk-ved-deploy-backups/$TIMESTAMP"
            THEME_PATH="${{ secrets.SERVER_PATH }}/wp-content/themes/atk-ved-theme"
            mkdir -p "$BACKUP_DIR"
            if [ -d "$THEME_PATH" ]; then
              rsync -a "$THEME_PATH/" "$BACKUP_DIR/" --exclude=node_modules --exclude=.git
              echo "Backup saved to $BACKUP_DIR"
            else
              echo "Theme directory not found, skipping backup"
            fi

      - name: Upload custom code bundle
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "wp-content/themes/atk-ved-theme,scripts"
          target: "/tmp/atk-ved-deploy-${{ github.run_id }}"

      - name: Sync custom code into WordPress
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -euo pipefail

            STAGING="/tmp/atk-ved-deploy-${{ github.run_id }}"
            TARGET="${{ secrets.SERVER_PATH }}"
            THEME_TARGET="$TARGET/wp-content/themes/atk-ved-theme"

            if [ ! -d "$STAGING/wp-content/themes/atk-ved-theme" ]; then
              echo "ERROR: staging bundle missing at $STAGING"
              exit 1
            fi

            bash "$STAGING/scripts/verify-deploy-bundle.sh" "$STAGING" "staging"

            mkdir -p "$TARGET/wp-content/themes"
            rsync -a --delete "$STAGING/wp-content/themes/atk-ved-theme/" "$THEME_TARGET/"

            bash "$STAGING/scripts/verify-deploy-bundle.sh" "$TARGET" "production" || {
              BACKUP_ROOT="/tmp/atk-ved-deploy-backups"
              LATEST="$(ls -dt "$BACKUP_ROOT"/*/ 2>/dev/null | head -1 || true)"
              if [ -n "$LATEST" ] && [ -d "$LATEST" ]; then
                echo "Restoring theme from $LATEST"
                rsync -a --delete "$LATEST/" "$THEME_TARGET/"
                bash "$STAGING/scripts/verify-deploy-bundle.sh" "$TARGET" "production-after-restore"
              else
                exit 1
              fi
            }

            chown -R atkvedru:atkvedru "$THEME_TARGET"

            if [ -d "$STAGING/scripts" ]; then
              mkdir -p "$TARGET/../atk-ved-scripts"
              rsync -a "$STAGING/scripts/" "$TARGET/../atk-ved-scripts/"
              chown -R atkvedru:atkvedru "$TARGET/../atk-ved-scripts"
            fi

            echo "::group::Cache flush"
            rm -rf "$TARGET/wp-content/cache/supercache/"* 2>/dev/null || true
            rm -f "$TARGET/wp-content/cache/*.php" 2>/dev/null || true
            echo "::endgroup::"

            echo "::group::Cache warmup"
            SITE_URL="https://atk-ved.ru"
            curl -sS -o /dev/null "$SITE_URL/"
            curl -sS -o /dev/null "$SITE_URL/services/"
            curl -sS -o /dev/null "$SITE_URL/contacts/"
            echo "::endgroup::"

            rm -rf "$STAGING"
            find /tmp -maxdepth 1 -type d -name 'atk-ved-deploy-*' -mtime +2 -exec rm -rf {} + 2>/dev/null || true

      - name: Cleanup old backups (keep last 10)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -euo pipefail
            BACKUP_ROOT="/tmp/atk-ved-deploy-backups"
            if [ -d "$BACKUP_ROOT" ]; then
              ls -dt "$BACKUP_ROOT"/*/ 2>/dev/null | tail -n +11 | xargs -r rm -rf
              echo "Backup cleanup done. Remaining:"
              ls -d "$BACKUP_ROOT"/*/ 2>/dev/null | wc -l
            else
              echo "No backup directory found, skipping cleanup"
            fi
